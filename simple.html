  <script>
    const REGISTER_URL = "https://trkrdr0.com/link/HXm3eB3Ope?affS1=landsimp";

    function buildTrackedUrl(baseUrl) {
      const incomingParams = new URLSearchParams(window.location.search);
      const finalUrl = new URL(baseUrl);

      incomingParams.forEach((value, key) => {
        finalUrl.searchParams.set(key, value);
      });

      return finalUrl.toString();
    }

    function redirectTo(url) {
      window.location.href = url;
    }

    function trackRegisterAndRedirect(url, buttonLabel) {
      let redirected = false;

      function safeRedirect() {
        if (redirected) return;
        redirected = true;
        redirectTo(url);
      }

      if (typeof fbq === "function") {
        fbq('track', 'Lead', {
          content_name: 'JokerGol Registro',
          content_category: 'Registro',
          button_name: buttonLabel
        });

        fbq('track', 'InitiateCheckout', {
          content_name: 'JokerGol Registro',
          content_category: 'Registro',
          button_name: buttonLabel
        });

        fbq('trackCustom', 'OutboundRegisterClick', {
          button_name: buttonLabel,
          destination_url: url
        });

        setTimeout(safeRedirect, 300);
      } else {
        safeRedirect();
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      const finalUrl = buildTrackedUrl(REGISTER_URL);
      const btn = document.getElementById("btnRegister");

      if (!btn) return;

      btn.href = finalUrl;

      btn.addEventListener("click", function(e) {
        e.preventDefault();
        trackRegisterAndRedirect(finalUrl, "btnRegister");
      });
    });
  </script>
